name: Test — simplex-tuition-web

on:
  push:
    branches: [main, feat/marketing-site]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simplex-tuition-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplex-tuition-web/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  e2e:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simplex-tuition-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: simplex-tuition-web/package-lock.json
      - run: npm ci
      - uses: cypress-io/github-action@v6
        with:
          working-directory: simplex-tuition-web
          build: npm run build
          start: npm run preview
          wait-on: 'http://localhost:4173'
          wait-on-timeout: 60
        env:
          VITE_FORMSPREE_URL: https://formspree.io/f/xlddjnre
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: simplex-tuition-web/cypress/screenshots/
